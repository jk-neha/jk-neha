name: Generate Snake 🐍

on:
  schedule:
    - cron: "0 0 * * *"   # Runs every day at midnight UTC
  workflow_dispatch:        # Allows manual trigger from Actions tab
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Generate GitHub Snake (Pink Theme)
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: jk-neha
          outputs: |
            dist/github-snake.svg?palette=github-dark&color_snake=F7A8C4&color_dots=#0d1117,#fce4ec,#f48fb1,#e91e63,#ad1457
            dist/github-snake-dark.svg?palette=github-dark&color_snake=F7A8C4&color_dots=#0d1117,#fce4ec,#f48fb1,#e91e63,#ad1457

      - name: Push snake to output branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
